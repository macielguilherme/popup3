<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pesquisa em Lote - DocZ</title>
    <style>
        /* ===== CSS BASE DOCZ ===== */
        html, body {
            margin: 0; padding: 0; border: 0; outline: 0;
            min-height: 100%; font-size: 12px; color: #595959;
            font-family: Arial, Helvetica, sans-serif; line-height: 20px;
            position: relative; background: #fafafa;
        }

        #backdrop {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
            z-index: 1002;
        }

        .ui-dialog {
            background: #585858; padding: 5px; border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5); width: 650px;
        }

        .ui-dialog-titlebar {
            background: url("https://docz.sosdocs.com.br/Docz/app/images/backgrounds/titleBg.png") repeat-x;
            height: 36px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 10px; border-bottom: 1px solid #cdcdcd;
        }

        .ui-dialog-title { font-weight: bold; color: #595959; font-size: 12px; }

        #dialogPesquisaLote {
            position: relative; padding: 10px 12px; background: #FAFAFA; 
            clear: both; min-height: 343px; overflow: hidden;
        }

        .widget { background: #f9f9f9; border: 1px solid #cdcdcd; border-radius: 3px; box-shadow: 0 1px 0 #fff; margin-bottom: 10px; }
        
        .widget .title {
            height: 36px; background: #efefef url("https://docz.sosdocs.com.br/Docz/app/images/backgrounds/titleBg.png") repeat-x;
            border-bottom: 1px solid #cdcdcd; display: flex; align-items: center;
        }
        
        .widget .title .titleIcon { padding: 11px; border-right: 1px solid #D5D5D5; margin-right: 10px; }
        .widget .title h6 { font-weight: bold; margin: 0; font-size: 11px; }

        /* ===== BARRA DE CAMPOS ATIVOS ===== */
        #activeFieldsBar {
            background: #fff; border-bottom: 1px solid #e2e2e2;
            padding: 10px 12px; text-align: center;
            display: block;
        }
        #activeFieldsBar span { font-size: 10px; color: #666; text-transform: uppercase; font-weight: bold; }
        #activeFieldsBar i { font-style: normal; color: #ccc; margin: 0 10px; font-size: 12px; vertical-align: middle; }

        .formRow { padding: 8px; clear: both; border-bottom: 1px solid #E2E2E2; position: relative; }

        input[type=text] {
            font-size: 11px; padding: 7px 10px; background: white; border: 1px solid #DDD;
            width: 97%; display: block; margin: 5px auto; box-shadow: 0 0 0 2px #f4f4f4;
            color: #656565; box-sizing: border-box;
        }

        .scroll-container { overflow-y: auto; max-height: 160px; background: #fff; }
        .sTable { border-collapse: collapse; width: 100%; }
        .sTable thead td {
            border-bottom: 1px solid #cbcbcb; border-left: 1px solid #cbcbcb;
            background: #efefef url("https://docz.sosdocs.com.br/Docz/app/images/backgrounds/titleBg.png") repeat-x;
            color: #878787; font-size: 11px; padding: 4px 8px; text-align: center;
        }
        .sTable thead td:first-child { border-left: none; }
        .sTable tbody td { padding: 6px; border-bottom: 1px solid #eee; text-align: center; font-size: 11px; color: #666; }

        /* ===== RODAPÉ COM BOTÕES ===== */
        .footer-btn { padding: 12px 0 5px 0; border-top: 1px solid #E2E2E2; margin-top: 5px; }

        .button {
            font-size: 10px; font-weight: bold; text-transform: uppercase;
            background-image: url("https://docz.sosdocs.com.br/Docz/app/images/ui/usualButtons.png");
            background-repeat: repeat-x; cursor: pointer; display: inline-block;
            border-radius: 2px; color: #fff; text-decoration: none;
            line-height: 12px; height: 28px;
            margin-left: 6px;
        }
        .button span { padding: 8px 15px; display: block; text-align: center; }

        .greenB { background-position: 0 -425px; border: 1px solid #7ca82a; }
        .blueB { background-position: 0 -85px; border: 1px solid #3672a0; color: #fff; }

        .btnExcluir { color: #9f352b; cursor: pointer; font-weight: bold; font-size: 14px; }
        .clear { clear: both; }
        
        .info-helper {
            font-size: 10px;
            color: #999;
            margin-top: 3px;
            margin-bottom: 5px;
            text-align: left;
            padding-left: 5px;
        }
        .info-helper i {
            font-style: normal;
            background: #eee;
            padding: 2px 5px;
            border-radius: 3px;
        }
    </style>
</head>
<body>

<div id="backdrop">
    <div class="ui-dialog">
        <div class="ui-dialog-titlebar">
            <span class="ui-dialog-title">Pesquisa em Lote</span>
            <span style="cursor:pointer; color: #555;">✖</span>
        </div>

        <div id="dialogPesquisaLote">
            <div class="widget">
                <div class="title">
                    <img src="https://docz.sosdocs.com.br/Docz/app/images/icons/dark/list.png" class="titleIcon">
                    <h6>Pesquisa por Metadados</h6>
                </div>

                <div id="activeFieldsBar">
                    <span>Identificador SOS</span><i>•</i>
                    <span>Identificador Cliente</span><i>•</i>
                    <span>Nº Anterior</span><i>•</i>
                    <span>Localização</span><i>•</i>
                    <span>Status</span><i>•</i>
                    <span>Serviço</span><i>•</i>
                    <span>Descrição</span><i>•</i>
                    <span>Departamento</span><i>•</i>
                    <span>Tipo Objeto</span><i>•</i>
                    <span>Lacre 01</span>
                </div>

                <div class="formRow">
                    <input id="idPEL" type="text" placeholder="Digite ou cole vários valores separados por espaço">
                    <div class="info-helper">
                        <i>Dica:</i> Use espaço para separar múltiplos itens
                    </div>
                </div>

                <div class="scroll-container">
                    <table class="sTable">
                        <thead>
                            <tr>
                                <td>Valor para pesquisar</td>
                                <td width="60">Excluir</td>
                            </tr>
                        </thead>
                        <tbody id="lista_pel"></tbody>
                    </table>
                </div>
            </div>

            <div class="footer-btn">
                <div style="float: right;">
                    <a id="btnPesquisarEmLote" href="javascript:void(0)" class="button greenB">
                        <span>Pesquisar</span>
                    </a>
                </div>
                <div class="clear"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const input = document.getElementById('idPEL');
    const lista = document.getElementById('lista_pel');

    function adicionarItens(valores) {
        // Divide a string por espaços e remove itens vazios
        const itens = valores.split(/\s+/).filter(item => item.trim() !== '');
        
        // Adiciona cada item como uma linha separada
        itens.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${item.trim()}</td>
                <td><span class="btnExcluir" onclick="this.parentElement.parentElement.remove()">✖</span></td>
            `;
            lista.prepend(tr);
        });
    }

    input.addEventListener('keypress', function(e) {
        if (e.key === 'Enter' && this.value.trim() !== '') {
            adicionarItens(this.value);
            this.value = ''; // Limpa o campo após adicionar
        }
    });

    // Opcional: Suporte para colar múltiplos itens com espaço
    input.addEventListener('paste', function(e) {
        // Deixa o evento padrão acontecer primeiro
        setTimeout(() => {
            if (this.value.trim() !== '') {
                // Se colou algo, processa automaticamente
                adicionarItens(this.value);
                this.value = '';
            }
        }, 10);
    });
</script>

</body>
</html>
